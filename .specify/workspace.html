<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%230A122A'/%3E%3Cstop offset='100%25' stop-color='%2313315C'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='36' height='36' rx='10' fill='url(%23g)'/%3E%3Crect x='10' y='12' width='4' height='12' rx='.5' fill='%23FFF'/%3E%3Crect x='16' y='12' width='4' height='8' rx='.5' fill='%23FFF'/%3E%3Crect x='16' y='22' width='4' height='2' rx='.5' fill='%23FFF'/%3E%3Crect x='22' y='12' width='4' height='6' rx='.5' fill='%23FFF'/%3E%3Crect x='22' y='20' width='4' height='4' rx='.5' fill='%23FFF'/%3E%3Ccircle cx='18' cy='8' r='2' fill='%23FFD700'/%3E%3C/svg%3E">
  <title>Workspace &mdash; SDD ALM</title>
  <link rel="icon" href="shared/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/tokens.css">
  <script src="shared/search.js" defer></script>
  <script src="shared/data.js"></script>
  <script src="shared/filter.js" defer></script>
  <script src="shared/i18n.js" defer></script>
  <script src="shared/nav.js" defer></script>
  <script src="shared/footer.js" defer></script>
  <style>
    .ws-main { max-width:1280px; margin:0 auto; padding:2rem 1.5rem 3rem; }
    .page-header { margin-bottom:2rem; }
    .page-title { font-size:1.75rem; font-weight:900; margin-bottom:0.25rem; }
    .page-title .gold { color:var(--brand-gold); }
    .page-subtitle { color:var(--text-muted); font-size:0.9rem; }

    .section-title {
      font-size:1.1rem; font-weight:700; margin-bottom:1rem;
      display:flex; align-items:center; gap:0.5rem;
    }

    /* File Tree */
    .file-tree-section { margin-bottom:2.5rem; }
    .file-tree { font-family:var(--font-mono); font-size:0.82rem; }
    .tree-folder {
      cursor:pointer; user-select:none;
      display:flex; align-items:center; gap:0.4rem;
      padding:0.35rem 0.5rem; border-radius:var(--radius-sm);
      transition:background var(--transition-fast);
    }
    .tree-folder:hover { background:var(--bg-raised); }
    .tree-chevron {
      display:inline-block; width:14px; text-align:center;
      color:var(--text-dim); transition:transform var(--transition-fast);
      font-size:0.7rem;
    }
    .tree-chevron.open { transform:rotate(90deg); }
    .tree-folder-icon { color:var(--brand-gold); }
    .tree-folder-name { color:var(--text-primary); font-weight:600; }
    .tree-children { padding-left:1.25rem; overflow:hidden; }
    .tree-children.collapsed { display:none; }
    .tree-file {
      display:flex; align-items:center; gap:0.4rem;
      padding:0.3rem 0.5rem 0.3rem 1.75rem;
      border-radius:var(--radius-sm);
      transition:background var(--transition-fast);
    }
    .tree-file:hover { background:var(--bg-raised); }
    .tree-file-icon { flex-shrink:0; }
    .icon-md { color:var(--brand-blue); }
    .icon-json { color:var(--brand-gold); }
    .icon-html { color:var(--brand-amber); }
    .icon-feature { color:var(--brand-purple); }
    .icon-other { color:var(--text-dim); }
    .tree-file-name { color:var(--text-muted); flex:1; }
    .tree-file-meta {
      font-size:0.7rem; color:var(--text-dim);
      margin-left:auto; white-space:nowrap;
    }

    /* RAG Memory */
    .rag-section { margin-bottom:2.5rem; }
    .rag-tree { background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:12px; padding:1rem; }
    .tree-dir { display:flex; align-items:center; gap:.5rem; padding:.4rem .5rem; font-family:var(--font-heading); font-weight:700; font-size:.85rem; color:var(--brand-gold); }
    .tree-dir-icon svg { display:block; }
    .tree-count { font-size:.65rem; font-weight:600; padding:.1rem .4rem; border-radius:4px; background:rgba(255,215,0,.1); color:var(--brand-gold); margin-left:auto; }
    .rag-file { display:flex; align-items:flex-start; flex-wrap:wrap; gap:.4rem; padding:.5rem .5rem .5rem 1.5rem; border-top:1px solid var(--border-faint); cursor:default; transition:background .15s; }
    .rag-file:hover { background:rgba(255,255,255,.02); }
    .tree-indent { width:12px; flex-shrink:0; }
    .tree-file-icon { flex-shrink:0; }
    .tree-file-icon svg { display:block; }
    .tree-file-name { font-family:var(--font-mono); font-size:.8rem; color:var(--text-primary); }
    .tree-file-size { font-size:.65rem; color:var(--text-dim); margin-left:auto; }
    .tree-file-abstract { width:100%; font-size:.75rem; color:var(--text-muted); padding-left:1.75rem; margin-top:.15rem; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .rag-header { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
    .rag-name {
      font-family:var(--font-heading); font-size:0.95rem; font-weight:700;
      color:var(--text-primary);
    }
    .rag-type-badge {
      font-size:0.7rem; font-weight:600; padding:2px 8px;
      border-radius:12px; text-transform:uppercase;
    }
    .rag-type-text { background:rgba(19,125,197,0.12); color:var(--brand-blue); }
    .rag-type-html { background:rgba(249,115,22,0.12); color:var(--brand-amber); }
    .rag-type-image { background:rgba(139,92,246,0.12); color:var(--brand-purple); }
    .rag-type-audio { background:rgba(255,215,0,0.12); color:var(--brand-gold); }
    .rag-type-default { background:rgba(148,163,184,0.12); color:var(--text-muted); }
    .rag-abstract {
      font-size:0.82rem; color:var(--text-muted); line-height:1.55;
      display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
    }

    /* Session Activity */
    .activity-section { margin-bottom:2rem; }
    .timeline { display:flex; flex-direction:column; gap:0; padding-left:1.5rem; border-left:2px solid var(--border-medium); }
    .timeline-item { position:relative; padding:0.55rem 0 0.55rem 1.25rem; }
    .timeline-item::before {
      content:''; position:absolute; left:-1.5rem; top:0.75rem; transform:translateX(-50%);
      width:10px; height:10px; border-radius:50%; background:var(--brand-gold);
      border:2px solid var(--bg-body);
    }
    .timeline-item:last-child { padding-bottom:0; }
    .tl-row { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
    .tl-time { font-size:0.7rem; color:var(--text-dim); font-family:var(--font-mono); }
    .tl-type-badge {
      font-size:0.65rem; font-weight:600; padding:1px 6px;
      border-radius:10px; text-transform:uppercase;
    }
    .tl-badge-spec { background:rgba(19,125,197,0.12); color:var(--brand-blue); }
    .tl-badge-test { background:rgba(255,215,0,0.12); color:var(--brand-gold); }
    .tl-badge-fix { background:rgba(249,115,22,0.12); color:var(--brand-amber); }
    .tl-badge-deploy { background:rgba(19,125,197,0.12); color:var(--brand-blue); }
    .tl-badge-sentinel { background:rgba(139,92,246,0.12); color:var(--brand-purple); }
    .tl-badge-default { background:rgba(148,163,184,0.12); color:var(--text-muted); }
    .tl-desc { font-size:0.82rem; color:var(--text-muted); }

    /* No data */
    .no-data { text-align:center; padding:3rem 1rem; }
    .no-data-icon { font-size:3rem; margin-bottom:1rem; opacity:0.4; }
    .no-data-text { color:var(--text-dim); font-size:0.95rem; margin-bottom:1rem; }
    .empty-state {
      text-align:center; padding:2rem; color:var(--text-dim); font-size:0.85rem;
      border:1px dashed var(--border-medium); border-radius:var(--radius-sm);
    }

    /* ── Search & Filter ────────────────────────────────────── */
    .sdd-search-bar { margin-bottom: 1.5rem; }
    .sdd-search-input-wrap { position: relative; display: flex; align-items: center; }
    .sdd-search-icon { position: absolute; left: 12px; width: 18px; height: 18px; color: #94A3B8; pointer-events: none; }
    .sdd-search-input { width: 100%; padding: 10px 12px 10px 40px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #E2E8F0; font-family: var(--font-body, Trebuchet MS, sans-serif); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .sdd-search-input:focus { border-color: #FFD700; box-shadow: 0 0 0 2px rgba(255,215,0,0.15); }
    .sdd-search-count { position: absolute; right: 12px; font-size: 11px; color: #64748B; font-family: var(--font-mono, 'JetBrains Mono', monospace); }
    .sdd-filter-chips { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .sdd-chip { padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #94A3B8; font-size: 12px; cursor: pointer; font-family: var(--font-body, Trebuchet MS, sans-serif); transition: all 0.2s; }
    .sdd-chip:hover { border-color: rgba(255,215,0,0.3); color: #E2E8F0; }
    .sdd-chip.active { background: rgba(255,215,0,0.12); border-color: #FFD700; color: #FFD700; }

    /* RAG View Toggle */
    .rag-view-toggle {
      display:inline-flex; border-radius:9999px; overflow:hidden;
      border:1px solid rgba(255,215,0,0.2); margin-left:auto;
    }
    .rag-toggle-btn {
      padding:0.3rem 0.9rem; font-size:0.75rem; font-weight:600;
      font-family:var(--font-heading); cursor:pointer; border:none;
      background:transparent; color:var(--text-dim);
      transition:all 0.2s ease;
    }
    .rag-toggle-btn:hover { color:var(--text-muted); }
    .rag-toggle-btn.active {
      background:rgba(255,215,0,0.15); color:#FFD700;
    }

    /* RAG Explorer View */
    .rag-explorer { display:none; }
    .rag-explorer.visible { display:block; }
    .rag-cards-view.hidden { display:none; }

    .rag-explorer-tree { font-family:var(--font-mono); font-size:0.82rem; }
    .rag-explorer-file {
      display:flex; align-items:center; gap:0.4rem;
      padding:0.35rem 0.5rem 0.35rem 1.75rem;
      border-radius:var(--radius-sm);
      transition:background var(--transition-fast);
      cursor:pointer; user-select:none;
    }
    .rag-explorer-file:hover { background:var(--bg-raised); }
    .rag-explorer-file-name { color:var(--text-primary); font-weight:600; flex:1; }
    .rag-explorer-badge {
      font-size:0.65rem; font-weight:600; padding:1px 7px;
      border-radius:12px; text-transform:uppercase;
    }
    .rag-explorer-size {
      font-size:0.7rem; color:var(--text-dim);
      margin-left:0.5rem; white-space:nowrap;
    }
    .rag-explorer-chevron {
      display:inline-block; width:14px; text-align:center;
      color:var(--text-dim); transition:transform 0.15s ease;
      font-size:0.7rem;
    }
    .rag-explorer-chevron.open { transform:rotate(90deg); }

    /* Explorer expanded detail card */
    .rag-explorer-detail {
      display:none; margin:0.25rem 0 0.5rem 1.75rem;
      padding:0.75rem 1rem; border-radius:12px;
      background:rgba(255,255,255,0.03);
      backdrop-filter:blur(16px) saturate(180%);
      -webkit-backdrop-filter:blur(16px) saturate(180%);
      border:1px solid rgba(255,255,255,0.06);
    }
    .rag-explorer-detail.open { display:block; }
    .rag-detail-abstract {
      font-size:0.8rem; color:var(--text-muted); line-height:1.55;
      margin-bottom:0.5rem; font-family:var(--font-body);
    }
    .rag-detail-section-label {
      font-size:0.65rem; font-weight:700; text-transform:uppercase;
      color:var(--text-dim); letter-spacing:0.05em; margin-bottom:0.3rem;
    }
    .rag-detail-takeaways {
      font-size:0.78rem; color:var(--text-muted); line-height:1.5;
      margin-bottom:0.5rem; padding-left:1rem; font-family:var(--font-body);
    }
    .rag-detail-takeaways li { margin-bottom:0.2rem; }
    .rag-detail-tags { display:flex; flex-wrap:wrap; gap:0.35rem; }
    .rag-tag-pill {
      font-size:0.65rem; font-weight:600; padding:2px 10px;
      border-radius:9999px; border:1px solid rgba(255,215,0,0.35);
      color:#FFD700; background:transparent;
    }

    /* ── Workspace Sessions ── */
    .ws-sessions-section { margin-bottom:2rem; }
    .ws-sessions-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));
      gap:var(--space-md,16px);
    }
    .ws-session-card {
      background:rgba(255,255,255,0.03);
      backdrop-filter:blur(16px) saturate(180%);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:var(--radius-md,12px);
      padding:var(--space-md,16px);
      transition:border-color 0.2s, box-shadow 0.2s;
      position:relative;
    }
    .ws-session-card:hover {
      border-color:rgba(255,215,0,0.2);
      box-shadow:0 4px 24px rgba(18,37,98,0.25);
    }
    .ws-session-active {
      border-left:3px solid var(--brand-gold,#FFD700);
    }
    .ws-session-header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:0.4rem;
    }
    .ws-session-name {
      font-family:var(--font-heading,Poppins,sans-serif);
      font-weight:600; font-size:0.95rem; color:var(--text-primary,#F8F9FC);
      text-transform:capitalize;
    }
    .ws-session-badge {
      font-size:0.65rem; font-weight:700; text-transform:uppercase;
      padding:2px 10px; border-radius:9999px; letter-spacing:0.04em;
    }
    .ws-status-active { background:rgba(255,215,0,0.15); color:#FFD700; }
    .ws-status-archived { background:rgba(148,163,184,0.12); color:#94A3B8; }
    .ws-status-done { background:rgba(19,125,197,0.15); color:#137DC5; }
    .ws-session-date {
      font-size:0.75rem; color:var(--text-dim,#475569); margin-bottom:0.6rem;
      font-family:var(--font-mono,monospace);
    }
    .ws-session-stats {
      display:flex; gap:1rem; flex-wrap:wrap;
    }
    .ws-stat {
      font-size:0.75rem; color:var(--text-muted,#94A3B8);
      display:flex; align-items:center; gap:0.25rem;
    }
    .ws-session-active-label {
      position:absolute; top:8px; right:12px;
      font-size:0.6rem; font-weight:700; text-transform:uppercase;
      color:var(--brand-gold,#FFD700); letter-spacing:0.06em;
    }
    .ws-session-count {
      font-size:0.7rem; font-weight:700; background:rgba(255,215,0,0.15);
      color:#FFD700; padding:2px 8px; border-radius:9999px;
    }
    .ws-session-summary {
      font-size:0.7rem; color:var(--text-dim,#475569); font-weight:400;
      margin-left:auto;
    }
    .ws-session-meta {
      display:flex; gap:0.75rem; align-items:center; margin-bottom:0.5rem;
    }
    .ws-session-last {
      font-size:0.7rem; color:var(--text-dim,#475569); font-style:italic;
    }
    .ws-session-card { cursor:pointer; }
    .ws-session-card.expanded { border-color:rgba(255,215,0,0.3); }
    .ws-session-detail {
      display:none; padding:var(--space-sm,8px) var(--space-md,16px) var(--space-md,16px);
      background:rgba(255,255,255,0.015);
      border:1px solid rgba(255,255,255,0.04);
      border-top:none; border-radius:0 0 var(--radius-md,12px) var(--radius-md,12px);
      margin-top:-1px;
    }
    .ws-session-detail.open { display:block; }
    .ws-detail-label {
      font-size:0.65rem; font-weight:700; text-transform:uppercase;
      color:var(--text-dim,#475569); letter-spacing:0.05em;
      margin-bottom:0.3rem; margin-top:0.5rem;
    }
    .ws-detail-id {
      font-size:0.75rem; font-family:var(--font-mono,monospace);
      color:var(--text-muted,#94A3B8);
    }
    .ws-detail-rag-list { display:flex; flex-direction:column; gap:0.35rem; }
    .ws-rag-item {
      display:flex; flex-wrap:wrap; align-items:center; gap:0.4rem;
      padding:0.3rem 0; border-bottom:1px solid rgba(255,255,255,0.03);
    }
    .ws-rag-item:last-child { border-bottom:none; }
    .ws-rag-name {
      font-size:0.8rem; color:var(--text-primary,#F8F9FC); font-weight:500;
    }
    .ws-rag-type {
      font-size:0.6rem; font-weight:600; text-transform:uppercase;
      padding:1px 6px; border-radius:9999px;
      background:rgba(255,215,0,0.1); color:var(--brand-gold,#FFD700);
    }
    .ws-rag-abstract {
      width:100%; font-size:0.72rem; color:var(--text-dim,#475569);
      line-height:1.4; margin-top:0.15rem;
    }

    @media(max-width:600px) {
      .rag-grid { grid-template-columns:1fr; }
      .rag-view-toggle { margin-left:0; margin-top:0.5rem; }
      .ws-sessions-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<main class="ws-main" id="ws-root">
  <div id="page-search"></div>
  <!-- Populated by script -->
</main>

<script>
(function () {
  'use strict';

  function D() { return window.DASHBOARD_DATA || null; }
  function get(path, fallback) {
    try {
      return path.split('.').reduce(function (o, k) { return o[k]; }, D()) ?? fallback;
    } catch (_) { return fallback; }
  }

  var root = document.getElementById('ws-root');

  if (!D()) {
    root.innerHTML =
      '<div class="no-data">' +
        '<div class="no-data-icon">&#x1F4C1;</div>' +
        '<h2 style="margin-bottom:0.5rem">No Data Loaded</h2>' +
        '<p class="no-data-text">Run <code style="color:var(--brand-gold)">/sdd:dashboard</code> to generate the <code>data.js</code> file, then refresh this page.</p>' +
      '</div>';
    return;
  }

  var projectName = get('project.name', 'SDD Project');

  /* ── Workspace Sessions ──────────────────────────────────── */
  var sessions = get('workspace.sessions', []);
  var activeSession = get('workspace.activeSession', null);
  var sessionsHTML = '';

  // Sort: active first, then by created desc
  sessions.sort(function (a, b) {
    if (a.id === activeSession) return -1;
    if (b.id === activeSession) return 1;
    return (b.created || '').localeCompare(a.created || '');
  });

  // Aggregate stats for header
  var wsStats = sessions.reduce(function (acc, s) {
    acc.inputs += s.inputCount || 0;
    acc.rags += s.ragCount || 0;
    acc.tasks += s.tasklogEntries || 0;
    if (s.status === 'active') acc.active++;
    if (s.status === 'done') acc.done++;
    if (s.status === 'archived') acc.archived++;
    return acc;
  }, { inputs: 0, rags: 0, tasks: 0, active: 0, done: 0, archived: 0 });

  if (sessions.length > 0) {
    var cards = '';
    sessions.forEach(function (s, idx) {
      var isActive = s.id === activeSession;
      var statusCls = s.status === 'active' ? 'ws-status-active' : s.status === 'archived' ? 'ws-status-archived' : 'ws-status-done';
      var statusLabel = s.status || 'unknown';
      var dateStr = s.created ? s.created.split('T')[0] : s.id.substring(0, 10);
      var detailId = 'ws-detail-' + idx;

      // RAG file list for expandable detail
      var ragList = '';
      if (Array.isArray(s.ragFiles) && s.ragFiles.length > 0) {
        ragList = '<div class="ws-detail-label">RAG Memory</div><div class="ws-detail-rag-list">';
        s.ragFiles.forEach(function (rf) {
          var name = (rf.filename || '').replace('rag-memory-of-', '').replace('.md', '');
          var abstract = rf.abstract ? rf.abstract.substring(0, 120) : '';
          ragList += '<div class="ws-rag-item">' +
            '<span class="ws-rag-name">' + name + '</span>' +
            '<span class="ws-rag-type">' + (rf.type || 'text') + '</span>' +
            (abstract ? '<div class="ws-rag-abstract">' + abstract + '</div>' : '') +
          '</div>';
        });
        ragList += '</div>';
      }

      // Last activity relative time
      var lastStr = '';
      if (s.lastActivity) {
        var diff = Math.floor((Date.now() - new Date(s.lastActivity).getTime()) / 60000);
        if (diff < 60) lastStr = diff + 'm ago';
        else if (diff < 1440) lastStr = Math.floor(diff / 60) + 'h ago';
        else lastStr = Math.floor(diff / 1440) + 'd ago';
      }

      cards += '<div class="ws-session-card' + (isActive ? ' ws-session-active' : '') + '" ' +
        'onclick="var d=document.getElementById(\'' + detailId + '\');d.classList.toggle(\'open\');this.classList.toggle(\'expanded\')" ' +
        'role="button" tabindex="0" aria-expanded="false" aria-controls="' + detailId + '">' +
        '<div class="ws-session-header">' +
          '<div class="ws-session-name">' + (s.name || s.id) + '</div>' +
          '<span class="ws-session-badge ' + statusCls + '">' + statusLabel + '</span>' +
        '</div>' +
        '<div class="ws-session-meta">' +
          '<span class="ws-session-date">' + dateStr + '</span>' +
          (lastStr ? '<span class="ws-session-last">' + lastStr + '</span>' : '') +
        '</div>' +
        '<div class="ws-session-stats">' +
          '<span class="ws-stat" title="Inputs">&#x1F4E5; ' + s.inputCount + ' inputs</span>' +
          '<span class="ws-stat" title="RAG files">&#x1F9E0; ' + s.ragCount + ' RAG</span>' +
          '<span class="ws-stat" title="Task log entries">&#x2705; ' + s.tasklogEntries + ' tasks</span>' +
        '</div>' +
        (isActive ? '<div class="ws-session-active-label">&#x25C9; Active</div>' : '') +
      '</div>' +
      '<div class="ws-session-detail" id="' + detailId + '">' +
        ragList +
        '<div class="ws-detail-label">Session ID</div>' +
        '<div class="ws-detail-id">' + s.id + '</div>' +
      '</div>';
    });

    sessionsHTML =
      '<section class="ws-sessions-section">' +
        '<h3 class="section-title" style="display:flex;align-items:center;gap:0.5rem">' +
          '&#x1F4CB; Workspace Sessions ' +
          '<span class="ws-session-count">' + sessions.length + '</span>' +
          '<span class="ws-session-summary">' +
            wsStats.inputs + ' inputs &middot; ' + wsStats.rags + ' RAG &middot; ' + wsStats.tasks + ' tasks' +
          '</span>' +
        '</h3>' +
        '<div class="ws-sessions-grid">' + cards + '</div>' +
      '</section>';
  } else {
    sessionsHTML =
      '<section class="ws-sessions-section">' +
        '<h3 class="section-title">&#x1F4CB; Workspace Sessions</h3>' +
        '<div class="empty-state">' +
          '<div style="font-size:1.5rem;margin-bottom:0.5rem">&#x1F4CB;</div>' +
          'No workspace sessions yet.<br>' +
          'Run <code style="color:var(--brand-gold)">/sdd:workspace create my-task</code> to isolate inputs, RAG, and logs per task.' +
        '</div>' +
      '</section>';
  }

  /* ── File Icons ───────────────────────────────────────────── */
  function fileIcon(name) {
    var ext = (name.split('.').pop() || '').toLowerCase();
    switch (ext) {
      case 'md': return '<span class="tree-file-icon icon-md">&#x1F4DD;</span>';
      case 'json': return '<span class="tree-file-icon icon-json">&#x2699;</span>';
      case 'html': return '<span class="tree-file-icon icon-html">&#x1F310;</span>';
      case 'feature': return '<span class="tree-file-icon icon-feature">&#x1F9EA;</span>';
      default: return '<span class="tree-file-icon icon-other">&#x1F4C4;</span>';
    }
  }

  /* ── File Tree ────────────────────────────────────────────── */
  var workspace = get('workspace', {});
  var files = workspace.files || [];
  var fileCount = typeof files === 'object' && files.length !== undefined ? files.length : files;

  var tree = {};
  if (Array.isArray(files)) {
    files.forEach(function (f) {
      var fPath = typeof f === 'string' ? f : (f.path || f.name || '');
      var parts = fPath.replace(/^\.?\/?/, '').split('/');
      var current = tree;
      for (var i = 0; i < parts.length - 1; i++) {
        if (!current[parts[i]]) current[parts[i]] = {};
        current = current[parts[i]];
      }
      var fileName = parts[parts.length - 1];
      if (fileName) {
        current[fileName] = {
          _file: true,
          _size: typeof f === 'object' ? (f.size || '') : '',
          _modified: typeof f === 'object' ? (f.modified || f.lastModified || '') : ''
        };
      }
    });
  }

  function renderTree(node, depth) {
    var html = '';
    var keys = Object.keys(node).sort(function (a, b) {
      var aIsDir = node[a] && !node[a]._file;
      var bIsDir = node[b] && !node[b]._file;
      if (aIsDir && !bIsDir) return -1;
      if (!aIsDir && bIsDir) return 1;
      return a.localeCompare(b);
    });

    keys.forEach(function (k) {
      if (k.charAt(0) === '_') return;
      var item = node[k];
      if (item && item._file) {
        var meta = '';
        if (item._size) meta += item._size;
        if (item._modified) meta += (meta ? ' &middot; ' : '') + item._modified;
        html += '<div class="tree-file">' +
          fileIcon(k) +
          '<span class="tree-file-name">' + k + '</span>' +
          (meta ? '<span class="tree-file-meta">' + meta + '</span>' : '') +
        '</div>';
      } else if (item && typeof item === 'object') {
        var id = 'folder-' + depth + '-' + k.replace(/[^a-zA-Z0-9]/g, '_');
        var isOpen = depth < 2;
        html += '<div class="tree-folder" onclick="this.querySelector(\'.tree-chevron\').classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'collapsed\')">' +
          '<span class="tree-chevron' + (isOpen ? ' open' : '') + '">&#x25B6;</span>' +
          '<span class="tree-folder-icon">&#x1F4C2;</span>' +
          '<span class="tree-folder-name">' + k + '/</span>' +
        '</div>' +
        '<div class="tree-children' + (isOpen ? '' : ' collapsed') + '">' +
          renderTree(item, depth + 1) +
        '</div>';
      }
    });
    return html;
  }

  var treeHTML = '';
  var treeKeys = Object.keys(tree);
  if (treeKeys.length > 0) {
    treeHTML =
      '<section class="file-tree-section">' +
        '<h3 class="section-title">&#x1F4C2; '+(window.SDD && SDD.i18n ? SDD.i18n.t('workspace.files') : 'Project Files')+'</h3>' +
        '<div class="card" style="padding:var(--space-md)">' +
          '<div class="file-tree">' + renderTree(tree, 0) + '</div>' +
        '</div>' +
      '</section>';
  } else if (fileCount) {
    treeHTML =
      '<section class="file-tree-section">' +
        '<h3 class="section-title">&#x1F4C2; '+(window.SDD && SDD.i18n ? SDD.i18n.t('workspace.files') : 'Project Files')+'</h3>' +
        '<div class="card" style="padding:var(--space-lg);text-align:center">' +
          '<p style="color:var(--text-muted);font-size:0.9rem">' + fileCount + ' files in workspace</p>' +
          '<p style="color:var(--text-dim);font-size:0.8rem;margin-top:0.5rem">Detailed tree not available &mdash; run <code class="rec-cmd" style="display:inline-block;font-family:var(--font-mono);font-size:0.75rem;padding:0.2rem 0.55rem;border-radius:9999px;background:rgba(255,215,0,0.1);color:var(--brand-gold);font-weight:600">/sdd:dashboard</code> with full data</p>' +
        '</div>' +
      '</section>';
  } else {
    treeHTML =
      '<section class="file-tree-section">' +
        '<h3 class="section-title">&#x1F4C2; '+(window.SDD && SDD.i18n ? SDD.i18n.t('workspace.files') : 'Project Files')+'</h3>' +
        '<div class="empty-state">No workspace files detected &mdash; run <code style="color:var(--brand-gold)">/sdd:init</code> to scaffold the project</div>' +
      '</section>';
  }

  /* ── RAG Memory ───────────────────────────────────────────── */
  var ragFiles = [];
  if (Array.isArray(files)) {
    files.forEach(function (f) {
      var name = typeof f === 'string' ? f : (f.path || f.name || '');
      if (name.indexOf('rag-memory-of-') !== -1) {
        ragFiles.push(typeof f === 'object' ? f : { name: name });
      }
    });
  }

  function ragTypeBadge(type) {
    var cls = 'rag-type-default';
    if (type === 'text' || type === 'md') cls = 'rag-type-text';
    else if (type === 'html') cls = 'rag-type-html';
    else if (type === 'image') cls = 'rag-type-image';
    else if (type === 'audio') cls = 'rag-type-audio';
    return '<span class="rag-type-badge ' + cls + '">' + (type || 'doc') + '</span>';
  }

  /* RAG file icon by type */
  function ragFileIcon(type) {
    var icons = {
      html: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#FFD700" stroke-width="1.2"><path d="M2 2h3l1.5 2H12v8H2V2z"/></svg>',
      image: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#8B5CF6" stroke-width="1.2"><rect x="1" y="1" width="12" height="12" rx="2"/><circle cx="5" cy="5" r="1.5"/><path d="M1 10l3-3 2 2 3-4 4 5"/></svg>',
      audio: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#137DC5" stroke-width="1.2"><path d="M3 5v4h2l3 3V2L5 5H3z"/><path d="M10 4.5a3 3 0 0 1 0 5"/></svg>',
      text: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#94A3B8" stroke-width="1.2"><path d="M4 1h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2z"/><line x1="5" y1="5" x2="9" y2="5"/><line x1="5" y1="7" x2="9" y2="7"/><line x1="5" y1="9" x2="7" y2="9"/></svg>',
      md: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#94A3B8" stroke-width="1.2"><path d="M4 1h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2z"/><line x1="5" y1="5" x2="9" y2="5"/><line x1="5" y1="7" x2="9" y2="7"/><line x1="5" y1="9" x2="7" y2="9"/></svg>'
    };
    return icons[type] || icons.text;
  }

  /* ── RAG Explorer View builder ─────────────────────────── */
  function buildRagExplorer(ragList) {
    var html = '<div class="rag-explorer-tree">' +
      '<div class="tree-folder" onclick="this.querySelector(\'.tree-chevron\').classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'collapsed\')">' +
        '<span class="tree-chevron open">&#x25B6;</span>' +
        '<span class="tree-folder-icon">&#x1F4C2;</span>' +
        '<span class="tree-folder-name">memory/</span>' +
        '<span class="tree-file-meta" style="color:var(--brand-gold)">' + ragList.length + ' files</span>' +
      '</div>' +
      '<div class="tree-children">';

    ragList.forEach(function (rf, idx) {
      var rawName = rf.name || rf.path || '';
      var displayName = rawName.replace(/^.*rag-memory-of-/, '').replace(/\.md$/, '');
      var type = rf.type || 'md';
      var abstract = rf.abstract || rf.description || '';
      var takeaways = rf.takeaways || rf.keyTakeaways || rf.key_takeaways || [];
      var tags = rf.tags || [];
      var size = rf.size || '';
      var detailId = 'rag-detail-' + idx;

      html += '<div class="rag-explorer-file" onclick="var d=document.getElementById(\'' + detailId + '\');d.classList.toggle(\'open\');this.querySelector(\'.rag-explorer-chevron\').classList.toggle(\'open\')">' +
        '<span class="rag-explorer-chevron">&#x25B6;</span>' +
        '<span class="tree-file-icon">' + ragFileIcon(type) + '</span>' +
        '<span class="rag-explorer-file-name">' + displayName + '</span>' +
        ragTypeBadge(type) +
        (size ? '<span class="rag-explorer-size">' + size + '</span>' : '') +
      '</div>' +
      '<div class="rag-explorer-detail" id="' + detailId + '">';

      if (abstract) {
        html += '<div class="rag-detail-section-label">Abstract</div>' +
          '<div class="rag-detail-abstract">' + abstract + '</div>';
      }

      if (Array.isArray(takeaways) && takeaways.length > 0) {
        html += '<div class="rag-detail-section-label">Key Takeaways</div>' +
          '<ul class="rag-detail-takeaways">' +
          takeaways.map(function (t) { return '<li>' + t + '</li>'; }).join('') +
          '</ul>';
      }

      if (Array.isArray(tags) && tags.length > 0) {
        html += '<div class="rag-detail-section-label">Tags</div>' +
          '<div class="rag-detail-tags">' +
          tags.map(function (tag) { return '<span class="rag-tag-pill">' + tag + '</span>'; }).join('') +
          '</div>';
      }

      if (!abstract && (!Array.isArray(takeaways) || takeaways.length === 0) && (!Array.isArray(tags) || tags.length === 0)) {
        html += '<div style="font-size:0.78rem;color:var(--text-dim);font-style:italic">No metadata available for this memory file.</div>';
      }

      html += '</div>';
    });

    html += '</div></div>';
    return html;
  }

  var ragHTML = '';
  if (ragFiles.length > 0) {
    var ragCardsContent =
      '<div class="rag-cards-view" id="rag-cards-view">' +
        '<div class="rag-tree">' +
        '<div class="tree-dir"><span class="tree-dir-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#FFD700" stroke-width="1.2"><path d="M2 2h3l1.5 2H12v8H2V2z"/></svg></span><span class="tree-dir-name">memory/</span><span class="tree-count">' + ragFiles.length + '</span></div>' +
        ragFiles.map(function (rf) {
          var rawName = rf.name || rf.path || '';
          var displayName = rawName.replace(/^.*rag-memory-of-/, '').replace(/\.md$/, '');
          var type = rf.type || 'md';
          var abstract = rf.abstract || rf.description || '';
          var size = rf.size ? '<span class="tree-file-size">' + rf.size + '</span>' : '';
          return '<div class="tree-file rag-file" tabindex="0">' +
            '<span class="tree-indent"></span>' +
            '<span class="tree-file-icon">' + ragFileIcon(type) + '</span>' +
            '<span class="tree-file-name">' + displayName + '.md</span>' +
            ragTypeBadge(type) +
            size +
            (abstract ? '<div class="tree-file-abstract">' + abstract + '</div>' : '') +
          '</div>';
        }).join('') +
        '</div>' +
      '</div>';

    var ragExplorerContent =
      '<div class="rag-explorer" id="rag-explorer-view">' +
        '<div class="card" style="padding:var(--space-md)">' +
          buildRagExplorer(ragFiles) +
        '</div>' +
      '</div>';

    ragHTML =
      '<section class="rag-section">' +
        '<h3 class="section-title" style="justify-content:space-between">' +
          '<span style="display:flex;align-items:center;gap:0.5rem">'+(window.SDD && SDD.i18n ? SDD.i18n.t('workspace.rag') : 'RAG Memory Files')+'</span>' +
          '<div class="rag-view-toggle" id="rag-view-toggle">' +
            '<button class="rag-toggle-btn active" data-view="cards" onclick="window._ragToggle(\'cards\')">&#x1F4CB; Cards</button>' +
            '<button class="rag-toggle-btn" data-view="explorer" onclick="window._ragToggle(\'explorer\')">&#x1F333; Explorer</button>' +
          '</div>' +
        '</h3>' +
        ragCardsContent +
        ragExplorerContent +
      '</section>';
  } else {
    ragHTML =
      '<section class="rag-section">' +
        '<h3 class="section-title">'+(window.SDD && SDD.i18n ? SDD.i18n.t('workspace.rag') : 'RAG Memory Files')+'</h3>' +
        '<div class="empty-state">No RAG memory files yet. Use <code style="color:var(--brand-gold)">/sdd:capture</code> to save session knowledge.</div>' +
      '</section>';
  }

  /* ── Session Activity ─────────────────────────────────────── */
  var logs = get('sessionLog', []).slice(-20).reverse();

  function typeBadgeClass(type) {
    switch ((type || '').toLowerCase()) {
      case 'spec': return 'tl-badge-spec';
      case 'test': return 'tl-badge-test';
      case 'fix': return 'tl-badge-fix';
      case 'deploy': return 'tl-badge-deploy';
      case 'sentinel': return 'tl-badge-sentinel';
      default: return 'tl-badge-default';
    }
  }

  var activityHTML = '';
  if (logs.length > 0) {
    activityHTML =
      '<section class="activity-section">' +
        '<h3 class="section-title">&#x1F553; Session Activity</h3>' +
        '<div class="timeline">' +
        logs.map(function (e) {
          var ts = e.timestamp || e.time || '';
          var type = e.type || 'event';
          var desc = e.description || e.message || '';
          return '<div class="timeline-item">' +
            '<div class="tl-row">' +
              '<span class="tl-time">' + ts + '</span>' +
              '<span class="tl-type-badge ' + typeBadgeClass(type) + '">' + type + '</span>' +
            '</div>' +
            '<div class="tl-desc">' + desc + '</div>' +
          '</div>';
        }).join('') +
        '</div>' +
      '</section>';
  } else {
    activityHTML =
      '<section class="activity-section">' +
        '<h3 class="section-title">&#x1F553; Session Activity</h3>' +
        '<div class="empty-state">No session events recorded yet</div>' +
      '</section>';
  }

  /* ── Render ───────────────────────────────────────────────── */
  root.innerHTML =
    '<header class="page-header">' +
      '<h1 class="page-title"><span class="gold">&#x1F4C1;</span> '+(window.SDD && SDD.i18n ? SDD.i18n.t('workspace.title') : 'Workspace')+'</h1>' +
      '<p class="page-subtitle">File explorer, RAG memory, workspace sessions, and activity for ' + projectName + '</p>' +
    '</header>' +
    sessionsHTML +
    treeHTML +
    ragHTML +
    activityHTML;

  // RAG view toggle
  window._ragToggle = function (view) {
    var cards = document.getElementById('rag-cards-view');
    var explorer = document.getElementById('rag-explorer-view');
    var btns = document.querySelectorAll('.rag-toggle-btn');
    if (!cards || !explorer) return;
    btns.forEach(function (b) { b.classList.remove('active'); });
    if (view === 'explorer') {
      cards.classList.add('hidden');
      explorer.classList.add('visible');
    } else {
      cards.classList.remove('hidden');
      explorer.classList.remove('visible');
    }
    btns.forEach(function (b) {
      if (b.getAttribute('data-view') === view) b.classList.add('active');
    });
  };

  // Search + Filter
  setTimeout(function() {
    var ctrl = SDD.search.init('page-search', {
      placeholder: 'Search files...',
      filters: [{label:'Markdown',value:'md'}, {label:'JSON',value:'json'}, {label:'Feature',value:'feature'}, {label:'RAG',value:'rag'}],
      onSearch: function(q, f) { filterItems(q, f); },
      onFilter: function(f, q) { filterItems(q, f); }
    });
    function filterItems(query, filter) {
      // Filter file tree nodes
      var files = document.querySelectorAll('.tree-file');
      var folders = document.querySelectorAll('.tree-folder');
      var shown = 0, total = files.length;
      files.forEach(function(file) {
        var name = (file.querySelector('.tree-file-name') || {}).textContent || '';
        name = name.toLowerCase();
        var matchQuery = !query || name.indexOf(query) !== -1;
        var matchFilter = !filter || filter === 'all';
        if (filter === 'md') matchFilter = name.indexOf('.md') !== -1;
        else if (filter === 'json') matchFilter = name.indexOf('.json') !== -1;
        else if (filter === 'feature') matchFilter = name.indexOf('.feature') !== -1;
        else if (filter === 'rag') matchFilter = name.indexOf('rag') !== -1;
        if (matchQuery && matchFilter) { file.style.display = ''; shown++; }
        else { file.style.display = 'none'; }
      });
      // Also filter RAG cards
      var ragCards = document.querySelectorAll('.rag-card');
      ragCards.forEach(function(card) {
        var text = card.textContent.toLowerCase();
        var matchQuery = !query || text.indexOf(query) !== -1;
        var matchFilter = !filter || filter === 'all' || filter === 'rag';
        if (matchQuery && matchFilter) { card.style.display = ''; }
        else { card.style.display = 'none'; }
      });
      ctrl.setCount(shown, total);
    }
  }, 100);
})();
</script>

</body>
</html>
