<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%230A122A'/%3E%3Cstop offset='100%25' stop-color='%2313315C'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='36' height='36' rx='10' fill='url(%23g)'/%3E%3Crect x='10' y='12' width='4' height='12' rx='.5' fill='%23FFF'/%3E%3Crect x='16' y='12' width='4' height='8' rx='.5' fill='%23FFF'/%3E%3Crect x='16' y='22' width='4' height='2' rx='.5' fill='%23FFF'/%3E%3Crect x='22' y='12' width='4' height='6' rx='.5' fill='%23FFF'/%3E%3Crect x='22' y='20' width='4' height='4' rx='.5' fill='%23FFF'/%3E%3Ccircle cx='18' cy='8' r='2' fill='%23FFD700'/%3E%3C/svg%3E">
  <title>Quality &mdash; SDD ALM</title>
  <link rel="icon" href="shared/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/tokens.css">
  <script src="shared/search.js" defer></script>
  <script src="shared/data.js"></script>
  <script src="shared/filter.js" defer></script>
  <script src="shared/i18n.js" defer></script>
  <script src="shared/nav.js" defer></script>
  <script src="shared/footer.js" defer></script>
  <style>
    .qa-main { max-width:1280px; margin:0 auto; padding:2rem 1.5rem 3rem; }
    .page-title { font-size:1.5rem; font-weight:900; margin-bottom:0.35rem; }
    .page-title .gold { color:var(--brand-gold); }
    .page-subtitle { color:var(--text-muted); font-size:0.9rem; margin-bottom:2rem; }
    .section-title {
      font-size:1.1rem; font-weight:700; margin-bottom:1rem;
      display:flex; align-items:center; gap:0.5rem;
    }

    /* ── Pass Rate Gauge ─────────────────────────────────────── */
    .gauge-wrap {
      display:flex; justify-content:center; margin-bottom:2.5rem;
    }
    .gauge-container { position:relative; width:220px; height:130px; }
    .gauge-container svg { width:220px; height:130px; }
    .gauge-bg { fill:none; stroke:var(--bg-raised); stroke-width:14; stroke-linecap:round; }
    .gauge-fill { fill:none; stroke-width:14; stroke-linecap:round; transition:stroke-dashoffset 1.2s ease; }
    .gauge-pct {
      position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
      font-family:var(--font-heading); font-size:2.2rem; font-weight:900;
    }
    .gauge-label {
      position:absolute; bottom:-14px; left:50%; transform:translateX(-50%);
      font-size:0.7rem; color:var(--text-muted); white-space:nowrap;
    }

    /* ── Checklist Progress ──────────────────────────────────── */
    .checklist-section { margin-bottom:2.5rem; }
    .checklist-row {
      display:flex; align-items:center; gap:0.75rem; margin-bottom:0.6rem;
    }
    .cl-name {
      width:160px; flex-shrink:0; font-size:0.82rem; font-weight:500;
      color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .cl-bar {
      flex:1; height:8px; border-radius:4px; background:var(--bg-raised); overflow:hidden;
    }
    .cl-bar-fill { height:100%; border-radius:4px; transition:width 0.8s ease; }
    .cl-bar-fill.gold { background:var(--brand-gold); }
    .cl-bar-fill.blue { background:var(--brand-blue); }
    .cl-count {
      font-family:var(--font-mono); font-size:0.72rem; color:var(--text-dim);
      width:60px; text-align:right; flex-shrink:0;
    }

    /* ── Test Pyramid ────────────────────────────────────────── */
    .pyramid-section { margin-bottom:2.5rem; }
    .pyramid-wrap { display:flex; justify-content:center; }
    .pyramid-container { position:relative; width:280px; height:200px; }
    .pyramid-container svg { width:280px; height:200px; }
    .pyramid-layer { transition:opacity var(--transition-normal); cursor:default; }
    .pyramid-layer:hover { opacity:0.85; }
    .pyramid-label {
      font-family:var(--font-heading); font-weight:700; font-size:0.72rem; fill:var(--text-primary);
      text-anchor:middle; pointer-events:none;
    }
    .pyramid-count {
      font-family:var(--font-mono); font-size:0.65rem; fill:var(--text-muted);
      text-anchor:middle; pointer-events:none;
    }

    /* ── Traceability Sankey ──────────────────────────────────── */
    .sankey-section { margin-bottom:2.5rem; }
    .sankey-wrap {
      background:var(--bg-card); backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
      border:1px solid var(--border-subtle); border-radius:var(--radius-card);
      padding:1.25rem; overflow-x:auto;
    }
    .sankey-container { min-width:500px; }
    .sankey-container svg { width:100%; }
    .sankey-node-label {
      font-family:var(--font-heading); font-size:0.7rem; font-weight:600; fill:var(--text-primary);
    }
    .sankey-count {
      font-family:var(--font-mono); font-size:0.6rem; fill:var(--text-muted);
    }

    /* ── Bug Cards ───────────────────────────────────────────── */
    .bugs-section { margin-bottom:2rem; }
    .bugs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:0.75rem; }
    .bug-card {
      background:var(--bg-card); backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
      border:1px solid rgba(239,68,68,0.15); border-radius:var(--radius-sm);
      padding:0.75rem; transition:transform var(--transition-fast);
    }
    .bug-card:hover { transform:translateY(-2px); }
    .bug-id { font-family:var(--font-mono); font-size:0.72rem; color:var(--brand-red); font-weight:600; }
    .bug-title { font-size:0.82rem; font-weight:500; color:var(--text-primary); margin:0.25rem 0; }
    .bug-sev {
      font-size:0.65rem; font-weight:600; padding:1px 6px; border-radius:6px;
      display:inline-block;
    }
    .bug-sev.critical { background:rgba(239,68,68,0.15); color:var(--brand-red); }
    .bug-sev.major { background:rgba(249,115,22,0.15); color:var(--brand-amber); }
    .bug-sev.minor { background:rgba(148,163,184,0.15); color:var(--text-muted); }

    /* ── DoD Tracker ──────────────────────────────────────────── */
    .dod-section { margin-bottom:2.5rem; }
    .dod-table {
      width:100%; border-collapse:collapse; font-size:0.82rem;
      background:var(--bg-card); backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
      border:1px solid var(--border-subtle); border-radius:var(--radius-card); overflow:hidden;
    }
    .dod-table th {
      text-align:left; padding:0.6rem 0.75rem; font-size:0.7rem; font-weight:600;
      color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em;
      border-bottom:1px solid var(--border-subtle); background:rgba(255,255,255,0.02);
    }
    .dod-table td { padding:0.55rem 0.75rem; border-bottom:1px solid rgba(255,255,255,0.03); }
    .dod-table tr.dod-passed { border-left:3px solid rgba(255,215,0,0.45); }
    .dod-status-icon { font-size:0.85rem; }

    /* ── Acceptance Criteria Matrix ─────────────────────────── */
    .ac-section { margin-bottom:2.5rem; }
    .ac-list { list-style:none; padding:0; margin:0; }
    .ac-item {
      display:flex; align-items:flex-start; gap:0.6rem; padding:0.5rem 0.75rem;
      background:var(--bg-card); backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
      border:1px solid var(--border-subtle); border-radius:var(--radius-sm);
      margin-bottom:0.4rem; font-size:0.82rem; transition:transform var(--transition-fast);
    }
    .ac-item:hover { transform:translateX(3px); }
    .ac-icon { flex-shrink:0; font-size:0.9rem; margin-top:1px; }
    .ac-id { font-family:var(--font-mono); font-weight:600; color:var(--brand-gold); font-size:0.75rem; margin-right:0.25rem; }
    .ac-summary {
      margin-top:0.75rem; font-size:0.78rem; color:var(--text-muted);
      background:var(--bg-card); backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
      border:1px solid var(--border-subtle); border-radius:var(--radius-sm);
      padding:0.5rem 0.75rem;
    }

    /* ── Feature Quality Heatmap ────────────────────────────── */
    .fq-section { margin-bottom:2.5rem; }
    .fq-table {
      width:100%; border-collapse:collapse; font-size:0.82rem;
      background:var(--bg-card); backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
      border:1px solid var(--border-subtle); border-radius:var(--radius-card); overflow:hidden;
    }
    .fq-table th {
      text-align:left; padding:0.6rem 0.75rem; font-size:0.7rem; font-weight:600;
      color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em;
      border-bottom:1px solid var(--border-subtle); background:rgba(255,255,255,0.02);
    }
    .fq-table td { padding:0.55rem 0.75rem; border-bottom:1px solid rgba(255,255,255,0.03); }
    .fq-cell { font-family:var(--font-mono); font-weight:600; font-size:0.78rem; padding:2px 8px; border-radius:4px; text-align:center; }
    .fq-cell.high { background:rgba(19,125,197,0.18); color:#137DC5; }
    .fq-cell.mid  { background:rgba(255,215,0,0.18);  color:#FFD700; }
    .fq-cell.low  { background:rgba(239,68,68,0.18);  color:#EF4444; }
    .fq-health { font-weight:900; font-size:0.85rem; }
    .fq-phase {
      font-size:0.65rem; font-weight:600; padding:2px 8px; border-radius:10px;
      display:inline-block; white-space:nowrap;
    }
    .fq-phase.plan      { background:rgba(19,125,197,0.15); color:#137DC5; }
    .fq-phase.spec      { background:rgba(255,215,0,0.15);  color:#FFD700; }
    .fq-phase.test      { background:rgba(19,125,197,0.15); color:#137DC5; }
    .fq-phase.impl      { background:rgba(255,215,0,0.15);  color:#FFD700; }
    .fq-phase.done      { background:rgba(19,125,197,0.15); color:#137DC5; }
    .fq-phase.default   { background:rgba(148,163,184,0.15); color:var(--text-muted); }

    /* ── QA Artifact Index ──────────────────────────────────── */
    .sa-section { margin-bottom:2.5rem; }
    .sa-table {
      width:100%; border-collapse:collapse; font-size:0.82rem;
      background:var(--bg-card); backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
      border:1px solid var(--border-subtle); border-radius:var(--radius-card); overflow:hidden;
    }
    .sa-table th {
      text-align:left; padding:0.6rem 0.75rem; font-size:0.7rem; font-weight:600;
      color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em;
      border-bottom:1px solid var(--border-subtle); background:rgba(255,255,255,0.02);
    }
    .sa-table td { padding:0.55rem 0.75rem; border-bottom:1px solid rgba(255,255,255,0.03); }
    .sa-badge {
      font-size:0.65rem; font-weight:600; padding:2px 8px; border-radius:10px;
      display:inline-block; white-space:nowrap;
    }
    .sa-badge.verified    { background:rgba(19,125,197,0.15); color:#137DC5; }
    .sa-badge.complete    { background:rgba(19,125,197,0.15); color:#137DC5; }
    .sa-badge.in-progress { background:rgba(255,215,0,0.15);  color:#FFD700; }
    .sa-badge.draft       { background:rgba(148,163,184,0.15); color:var(--text-muted); }
    .sa-badge.missing     { background:rgba(239,68,68,0.15);  color:#EF4444; }

    .qa-nodata-hint {
      text-align:center; padding:1.5rem 1rem; color:var(--text-dim); font-size:0.85rem;
      background:var(--bg-card); backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
      border:1px solid var(--border-subtle); border-radius:var(--radius-sm);
    }
    .qa-nodata-hint code { color:var(--brand-gold); }

    /* ── No Data ─────────────────────────────────────────────── */
    .no-data { text-align:center; padding:3rem 1rem; }
    .no-data-icon { font-size:3rem; margin-bottom:1rem; opacity:0.4; }
    .no-data-text { color:var(--text-dim); font-size:0.95rem; margin-bottom:1rem; }

    .cc-footer {
      text-align:center; padding:2rem 1rem; border-top:1px solid var(--border-subtle);
      color:var(--text-dim); font-size:0.75rem; margin-top:2rem;
    }
    .cc-footer .gold { color:var(--brand-gold); font-weight:600; }

    /* ── Search & Filter ────────────────────────────────────── */
    .sdd-search-bar { margin-bottom: 1.5rem; }
    .sdd-search-input-wrap { position: relative; display: flex; align-items: center; }
    .sdd-search-icon { position: absolute; left: 12px; width: 18px; height: 18px; color: #94A3B8; pointer-events: none; }
    .sdd-search-input { width: 100%; padding: 10px 12px 10px 40px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #E2E8F0; font-family: var(--font-body, Trebuchet MS, sans-serif); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .sdd-search-input:focus { border-color: #FFD700; box-shadow: 0 0 0 2px rgba(255,215,0,0.15); }
    .sdd-search-count { position: absolute; right: 12px; font-size: 11px; color: #64748B; font-family: var(--font-mono, 'JetBrains Mono', monospace); }
    .sdd-filter-chips { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .sdd-chip { padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #94A3B8; font-size: 12px; cursor: pointer; font-family: var(--font-body, Trebuchet MS, sans-serif); transition: all 0.2s; }
    .sdd-chip:hover { border-color: rgba(255,215,0,0.3); color: #E2E8F0; }
    .sdd-chip.active { background: rgba(255,215,0,0.12); border-color: #FFD700; color: #FFD700; }

    @media(max-width:600px) {
      .cl-name { width:100px; font-size:0.75rem; }
      .pyramid-container { width:220px; height:160px; }
      .pyramid-container svg { width:220px; height:160px; }
    }
  </style>
</head>
<body>

<main class="qa-main" id="qa-root">
<div id="page-search"></div>
</main>

<script>
(function () {
  'use strict';

  /* ── i18n helper ── */
  function t(key, fallback) { return (window.SDD && SDD.i18n ? SDD.i18n.t(key) : fallback); }

  function D() { return window.DASHBOARD_DATA || null; }
  function get(path, fallback) {
    try { return path.split('.').reduce(function(o,k){ return o[k]; }, D()) || fallback; }
    catch(_) { return fallback; }
  }
  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  var root = document.getElementById('qa-root');

  if (!D()) {
    root.innerHTML =
      '<h1 class="page-title"><span class="gold">&#x2713;</span> ' + t('quality.title','Quality') + '</h1>' +
      '<div class="no-data">' +
        '<div class="no-data-icon">&#x2713;</div>' +
        '<h2 style="margin-bottom:0.5rem" data-i18n="common.nodata">No Data Yet</h2>' +
        '<p class="no-data-text">Run <code style="color:var(--brand-gold)">/sdd:test</code> to generate tests,<br>then <code style="color:var(--brand-gold)">/sdd:dashboard</code> to refresh.</p>' +
      '</div>' +
      '<footer class="cc-footer">SDD v3.5 &middot; Spec Driven Development by metodolog<span class="gold">IA</span></footer>';
    return;
  }

  var features = get('features', []);
  var projectName = get('project.name', get('premise.name', 'SDD Project'));

  /* ── 1. Pass Rate Gauge (semicircle SVG) ───────────────── */
  var passRate = get('quality.passRate', get('insights.testPassRate', 0));
  if (typeof passRate !== 'number') passRate = parseInt(passRate, 10) || 0;
  passRate = Math.max(0, Math.min(100, Math.round(passRate)));

  var gaugeColor = passRate >= 75 ? 'var(--brand-gold)' : passRate >= 50 ? 'var(--brand-amber)' : 'var(--brand-red)';
  var R = 60, CX = 110, CY = 112;
  var halfCirc = Math.PI * R;
  var dashOffset = halfCirc - (halfCirc * passRate / 100);

  var gaugeHTML = '<div class="gauge-wrap"><div class="gauge-container">' +
    '<svg viewBox="0 0 220 130">' +
      '<path class="gauge-bg" d="M 20 112 A 60 60 0 0 1 200 112" />' +
      '<path class="gauge-fill" d="M 20 112 A 60 60 0 0 1 200 112"' +
        ' stroke="' + gaugeColor + '"' +
        ' stroke-dasharray="' + halfCirc.toFixed(2) + '"' +
        ' stroke-dashoffset="' + dashOffset.toFixed(2) + '" />' +
    '</svg>' +
    '<div class="gauge-pct" style="color:' + gaugeColor + '">' + passRate + '%</div>' +
    '<div class="gauge-label" data-i18n="quality.passrate">' + t('quality.passrate','Pass Rate') + '</div>' +
  '</div></div>';

  /* ── 2. Checklist Progress ─────────────────────────────── */
  var checklistHTML = '';
  if (features.length) {
    var bars = features.map(function(f) {
      var checked = 0, total = 0;
      if (f.progress) {
        if (typeof f.progress === 'string' && f.progress.indexOf('/') !== -1) {
          var parts = f.progress.split('/');
          checked = parseInt(parts[0], 10) || 0;
          total = parseInt(parts[1], 10) || 0;
        } else if (typeof f.progress === 'number') {
          checked = f.progress; total = 100;
        }
      }
      if (!total) {
        total = (Array.isArray(f.tests) ? f.tests.length : 0) + (Array.isArray(f.requirements) ? f.requirements.length : 0);
        checked = Math.round(total * (passRate / 100));
      }
      var pct = total ? Math.round((checked / total) * 100) : 0;
      var barClass = pct >= 100 ? 'gold' : 'blue';
      var fid = f.id || f.name || '';
      return '<div class="checklist-row" data-feature="' + fid + '">' +
        '<span class="cl-name" title="' + (f.name || f.id) + '">' + (f.name || f.id || 'Feature') + '</span>' +
        '<div class="cl-bar"><div class="cl-bar-fill ' + barClass + '" style="width:' + Math.min(pct,100) + '%"></div></div>' +
        '<span class="cl-count">' + checked + '/' + total + '</span>' +
      '</div>';
    }).join('');

    checklistHTML = '<section class="checklist-section">' +
      '<h3 class="section-title">&#x2611; ' + t('quality.checklist','Checklists') + '</h3>' +
      bars +
    '</section>';
  }

  /* ── 3. Test Pyramid ───────────────────────────────────── */
  var unitCount = 0, intCount = 0, e2eCount = 0;
  features.forEach(function(f) {
    var tests = f.tests || [];
    if (!Array.isArray(tests)) return;
    tests.forEach(function(t) {
      var type = (typeof t === 'object' && t.type) ? t.type.toLowerCase() : '';
      if (type.indexOf('unit') !== -1) unitCount++;
      else if (type.indexOf('int') !== -1) intCount++;
      else if (type.indexOf('e2e') !== -1 || type.indexOf('end') !== -1) e2eCount++;
      else unitCount++;
    });
  });
  /* Fallback: derive from total test counts */
  if (!unitCount && !intCount && !e2eCount) {
    var totalTests = 0;
    features.forEach(function(f) {
      totalTests += (Array.isArray(f.tests) ? f.tests.length : 0);
    });
    if (totalTests > 0) {
      unitCount = Math.round(totalTests * 0.6);
      intCount = Math.round(totalTests * 0.25);
      e2eCount = totalTests - unitCount - intCount;
    }
  }

  var pyramidHTML = '<section class="pyramid-section">' +
    '<h3 class="section-title">&#x25B3; ' + t('quality.testpyramid','Test Pyramid') + '</h3>' +
    '<div class="pyramid-wrap"><div class="pyramid-container">' +
    '<svg viewBox="0 0 280 200">' +
      '<!-- E2E (top, smallest) -->' +
      '<polygon class="pyramid-layer" points="140,15 180,70 100,70" fill="rgba(255,215,0,0.2)" stroke="var(--brand-gold)" stroke-width="1" />' +
      '<text class="pyramid-label" x="140" y="50">E2E</text>' +
      '<text class="pyramid-count" x="140" y="63">' + e2eCount + '</text>' +
      '<!-- Integration (middle) -->' +
      '<polygon class="pyramid-layer" points="100,75 180,75 210,135 70,135" fill="rgba(19,125,197,0.15)" stroke="var(--brand-blue)" stroke-width="1" />' +
      '<text class="pyramid-label" x="140" y="105">Integration</text>' +
      '<text class="pyramid-count" x="140" y="118">' + intCount + '</text>' +
      '<!-- Unit (bottom, largest) -->' +
      '<polygon class="pyramid-layer" points="70,140 210,140 245,190 35,190" fill="rgba(255,215,0,0.1)" stroke="var(--brand-gold)" stroke-width="1" stroke-opacity="0.5" />' +
      '<text class="pyramid-label" x="140" y="167">Unit</text>' +
      '<text class="pyramid-count" x="140" y="180">' + unitCount + '</text>' +
    '</svg>' +
    '</div></div>' +
  '</section>';

  /* ── 4. Sankey-style Traceability ──────────────────────── */
  var totalFR = 0, totalTS = 0, totalT = 0;
  features.forEach(function(f) {
    totalFR += (Array.isArray(f.requirements) ? f.requirements.length : 0);
    totalTS += (Array.isArray(f.tests) ? f.tests.length : 0);
    totalT  += (Array.isArray(f.tasks) ? f.tasks.length : 0);
  });

  var sankeyHTML = '';
  if (totalFR || totalTS || totalT) {
    /* Simple 3-column sankey visualization */
    var maxVal = Math.max(totalFR, totalTS, totalT, 1);
    var frH = Math.max(20, Math.round((totalFR / maxVal) * 100));
    var tsH = Math.max(20, Math.round((totalTS / maxVal) * 100));
    var tH  = Math.max(20, Math.round((totalT / maxVal) * 100));
    var svgH = Math.max(frH, tsH, tH) + 40;

    var frY = 20, tsY = 20, tY = 20;
    /* Center vertically */
    frY = Math.round((svgH - frH) / 2);
    tsY = Math.round((svgH - tsH) / 2);
    tY  = Math.round((svgH - tH) / 2);

    sankeyHTML = '<section class="sankey-section">' +
      '<h3 class="section-title">&#x21C9; Traceability: FR &#x2192; TS &#x2192; T</h3>' +
      '<div class="sankey-wrap"><div class="sankey-container">' +
      '<svg viewBox="0 0 500 ' + svgH + '" preserveAspectRatio="xMidYMid meet">' +
        '<!-- FR node -->' +
        '<rect x="10" y="' + frY + '" width="24" height="' + frH + '" rx="4" fill="var(--brand-gold)" opacity="0.8" />' +
        '<text class="sankey-node-label" x="22" y="' + (frY - 6) + '" text-anchor="middle">FR</text>' +
        '<text class="sankey-count" x="22" y="' + (frY + frH + 14) + '" text-anchor="middle">' + totalFR + '</text>' +
        '<!-- Flow FR -> TS -->' +
        '<path d="M 34 ' + (frY + frH/2) + ' C 120 ' + (frY + frH/2) + ', 130 ' + (tsY + tsH/2) + ', 228 ' + (tsY + tsH/2) + '"' +
          ' fill="none" stroke="var(--brand-gold)" stroke-width="' + Math.max(2, Math.round(frH * 0.3)) + '" opacity="0.2" />' +
        '<!-- TS node -->' +
        '<rect x="228" y="' + tsY + '" width="24" height="' + tsH + '" rx="4" fill="var(--brand-blue)" opacity="0.8" />' +
        '<text class="sankey-node-label" x="240" y="' + (tsY - 6) + '" text-anchor="middle">TS</text>' +
        '<text class="sankey-count" x="240" y="' + (tsY + tsH + 14) + '" text-anchor="middle">' + totalTS + '</text>' +
        '<!-- Flow TS -> T -->' +
        '<path d="M 252 ' + (tsY + tsH/2) + ' C 340 ' + (tsY + tsH/2) + ', 350 ' + (tY + tH/2) + ', 446 ' + (tY + tH/2) + '"' +
          ' fill="none" stroke="var(--brand-blue)" stroke-width="' + Math.max(2, Math.round(tsH * 0.3)) + '" opacity="0.2" />' +
        '<!-- T node -->' +
        '<rect x="446" y="' + tY + '" width="24" height="' + tH + '" rx="4" fill="var(--brand-gold)" opacity="0.6" />' +
        '<text class="sankey-node-label" x="458" y="' + (tY - 6) + '" text-anchor="middle">T</text>' +
        '<text class="sankey-count" x="458" y="' + (tY + tH + 14) + '" text-anchor="middle">' + totalT + '</text>' +
      '</svg>' +
      '</div></div>' +
    '</section>';
  }

  /* ── 5. Bug Summary ────────────────────────────────────── */
  var bugs = get('bugs', get('quality.bugs', null));
  var bugsHTML = '';
  if (bugs && Array.isArray(bugs) && bugs.length) {
    var bugCards = bugs.map(function(b) {
      var sev = (b.severity || b.priority || 'minor').toLowerCase();
      var sevClass = sev.indexOf('crit') !== -1 ? 'critical' : sev.indexOf('major') !== -1 || sev.indexOf('high') !== -1 ? 'major' : 'minor';
      return '<div class="bug-card">' +
        '<div class="bug-id">' + (b.id || 'BUG') + '</div>' +
        '<div class="bug-title">' + (b.title || b.name || b.description || 'Untitled') + '</div>' +
        '<span class="bug-sev ' + sevClass + '">' + sev + '</span>' +
      '</div>';
    }).join('');
    bugsHTML = '<section class="bugs-section">' +
      '<h3 class="section-title">&#x1F41B; Bugs <span style="font-size:0.75rem;color:var(--brand-red);font-weight:400">' + bugs.length + ' open</span></h3>' +
      '<div class="bugs-grid">' + bugCards + '</div>' +
    '</section>';
  }

  /* ── 6. DoD Tracker (qaplan.dod) ─────────────────────── */
  var dodHTML = '';
  (function() {
    var qaplan = get('qaplan', null);
    if (!qaplan) {
      dodHTML = '<section class="dod-section">' +
        '<h3 class="section-title">&#x2611; ' + t('quality.dod','Definition of Done') + '</h3>' +
        '<div class="qa-nodata-hint">Run <code>/sdd:qa</code> to generate QA Plan</div>' +
      '</section>';
      return;
    }
    var dod = qaplan.dod;
    if (!Array.isArray(dod) || !dod.length) {
      dodHTML = '<section class="dod-section">' +
        '<h3 class="section-title">&#x2611; ' + t('quality.dod','Definition of Done') + '</h3>' +
        '<div class="qa-nodata-hint">No DoD data available</div>' +
      '</section>';
      return;
    }
    var rows = dod.map(function(d) {
      var st = (d.status || '').toLowerCase();
      var icon = st === 'passed' ? '<span class="dod-status-icon" style="color:#FFD700">&#x2714;</span>'
               : st === 'in-progress' ? '<span class="dod-status-icon" style="color:#137DC5">&#x1F551;</span>'
               : '<span class="dod-status-icon" style="color:var(--text-dim)">&ndash;</span>';
      var rowClass = st === 'passed' ? ' class="dod-passed"' : '';
      return '<tr' + rowClass + '>' +
        '<td>' + esc(d.phase) + '</td>' +
        '<td>' + esc(d.name) + '</td>' +
        '<td>' + esc(d.criterion) + '</td>' +
        '<td style="font-family:var(--font-mono);font-size:0.78rem">' + esc(d.target) + '</td>' +
        '<td style="text-align:center">' + icon + '</td>' +
      '</tr>';
    }).join('');
    dodHTML = '<section class="dod-section">' +
      '<h3 class="section-title">&#x2611; ' + t('quality.dod','Definition of Done') + '</h3>' +
      '<table class="dod-table"><thead><tr>' +
        '<th>Phase</th><th>Name</th><th>Criterion</th><th>Target</th><th style="text-align:center">Status</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>' +
    '</section>';
  })();

  /* ── 7. Acceptance Criteria Matrix (qaplan.globalAC) ─── */
  var acHTML = '';
  (function() {
    var qaplan = get('qaplan', null);
    if (!qaplan) {
      acHTML = '<section class="ac-section">' +
        '<h3 class="section-title">&#x2705; ' + t('quality.ac','Acceptance Criteria') + '</h3>' +
        '<div class="qa-nodata-hint">Run <code>/sdd:qa</code> to generate QA Plan</div>' +
      '</section>';
      return;
    }
    var ac = qaplan.globalAC;
    if (!Array.isArray(ac) || !ac.length) {
      acHTML = '<section class="ac-section">' +
        '<h3 class="section-title">&#x2705; ' + t('quality.ac','Acceptance Criteria') + '</h3>' +
        '<div class="qa-nodata-hint">No acceptance criteria data available</div>' +
      '</section>';
      return;
    }
    var met = 0;
    var items = ac.map(function(a) {
      var checked = !!a.checked;
      if (checked) met++;
      var icon = checked
        ? '<span class="ac-icon" style="color:#137DC5">&#x2714;</span>'
        : '<span class="ac-icon" style="color:#FFD700">&#x25CB;</span>';
      return '<li class="ac-item">' + icon +
        '<div><span class="ac-id">' + esc(a.id) + ':</span> ' + esc(a.description) + '</div>' +
      '</li>';
    }).join('');
    var total = ac.length;
    var pct = total ? Math.round((met / total) * 100) : 0;
    acHTML = '<section class="ac-section">' +
      '<h3 class="section-title">&#x2705; ' + t('quality.ac','Acceptance Criteria') + '</h3>' +
      '<ul class="ac-list">' + items + '</ul>' +
      '<div class="ac-summary">' + met + '/' + total + ' criteria met (' + pct + '%)</div>' +
    '</section>';
  })();

  /* ── 8. Feature Quality Heatmap (qaplan.featureQuality) ── */
  var fqHTML = '';
  (function() {
    var qaplan = get('qaplan', null);
    if (!qaplan) {
      fqHTML = '<section class="fq-section">' +
        '<h3 class="section-title">&#x1F525; Feature Quality Heatmap</h3>' +
        '<div class="qa-nodata-hint">Run <code>/sdd:qa</code> to generate QA Plan</div>' +
      '</section>';
      return;
    }
    var fq = qaplan.featureQuality;
    if (!Array.isArray(fq) || !fq.length) {
      fqHTML = '<section class="fq-section">' +
        '<h3 class="section-title">&#x1F525; Feature Quality Heatmap</h3>' +
        '<div class="qa-nodata-hint">No feature quality data available</div>' +
      '</section>';
      return;
    }
    function pctClass(v) { v = parseFloat(v) || 0; return v >= 80 ? 'high' : v >= 50 ? 'mid' : 'low'; }
    function phaseClass(p) {
      p = (p || '').toLowerCase();
      if (p.indexOf('plan') !== -1) return 'plan';
      if (p.indexOf('spec') !== -1) return 'spec';
      if (p.indexOf('test') !== -1) return 'test';
      if (p.indexOf('impl') !== -1 || p.indexOf('deliver') !== -1) return 'impl';
      if (p.indexOf('done') !== -1 || p.indexOf('ship') !== -1) return 'done';
      return 'default';
    }
    var rows = fq.map(function(f) {
      var acP = parseFloat(f.acPct) || 0;
      var testP = parseFloat(f.testPct) || 0;
      var clP = parseFloat(f.checklistPct) || 0;
      var health = parseFloat(f.health) || 0;
      var pc = phaseClass(f.phase);
      return '<tr>' +
        '<td style="font-weight:500">' + esc(f.feature) + '</td>' +
        '<td><span class="fq-cell ' + pctClass(acP) + '">' + Math.round(acP) + '%</span></td>' +
        '<td><span class="fq-cell ' + pctClass(testP) + '">' + Math.round(testP) + '%</span></td>' +
        '<td><span class="fq-cell ' + pctClass(clP) + '">' + Math.round(clP) + '%</span></td>' +
        '<td><span class="fq-health ' + pctClass(health) + '" style="color:' + (health >= 80 ? '#137DC5' : health >= 50 ? '#FFD700' : '#EF4444') + '">' + Math.round(health) + '</span></td>' +
        '<td><span class="fq-phase ' + pc + '">' + esc(f.phase || 'unknown') + '</span></td>' +
      '</tr>';
    }).join('');
    fqHTML = '<section class="fq-section">' +
      '<h3 class="section-title">&#x1F525; Feature Quality Heatmap</h3>' +
      '<table class="fq-table"><thead><tr>' +
        '<th>Feature</th><th>AC%</th><th>Test%</th><th>Checklist%</th><th>Health</th><th>Phase</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>' +
    '</section>';
  })();

  /* ── 9. Sub-QA Artifacts (qaplan.subArtifacts) ─────────── */
  var saHTML = '';
  (function() {
    var qaplan = get('qaplan', null);
    if (!qaplan) {
      saHTML = '<section class="sa-section">' +
        '<h3 class="section-title">&#x1F4C2; QA Artifact Index</h3>' +
        '<div class="qa-nodata-hint">Run <code>/sdd:qa</code> to generate QA Plan</div>' +
      '</section>';
      return;
    }
    var sa = qaplan.subArtifacts;
    if (!Array.isArray(sa) || !sa.length) {
      saHTML = '<section class="sa-section">' +
        '<h3 class="section-title">&#x1F4C2; QA Artifact Index</h3>' +
        '<div class="qa-nodata-hint">No QA artifact data available</div>' +
      '</section>';
      return;
    }
    function badgeClass(s) {
      s = (s || '').toLowerCase().replace(/\s+/g, '-');
      if (s === 'verified') return 'verified';
      if (s === 'complete') return 'complete';
      if (s === 'in-progress') return 'in-progress';
      if (s === 'draft') return 'draft';
      if (s === 'missing') return 'missing';
      return 'draft';
    }
    var rows = sa.map(function(a) {
      var bc = badgeClass(a.status);
      return '<tr>' +
        '<td style="font-weight:500">' + esc(a.feature) + '</td>' +
        '<td><span style="font-family:var(--font-mono);font-size:0.78rem" title="' + esc(a.path) + '">' + esc(a.artifact) + '</span></td>' +
        '<td><span class="sa-badge ' + bc + '">' + esc(a.status || 'unknown') + '</span></td>' +
      '</tr>';
    }).join('');
    saHTML = '<section class="sa-section">' +
      '<h3 class="section-title">&#x1F4C2; QA Artifact Index</h3>' +
      '<table class="sa-table"><thead><tr>' +
        '<th>Feature</th><th>Artifact</th><th>Status</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>' +
    '</section>';
  })();

  /* ── Render ────────────────────────────────────────────── */
  root.innerHTML =
    '<h1 class="page-title"><span class="gold">&#x2713;</span> ' + t('quality.title','Quality') + '</h1>' +
    '<p class="page-subtitle">' + projectName + ' &mdash; ' + totalFR + ' requirements, ' + totalTS + ' tests, ' + passRate + '% pass rate</p>' +

    gaugeHTML +
    checklistHTML +
    pyramidHTML +
    sankeyHTML +
    bugsHTML +
    dodHTML +
    acHTML +
    fqHTML +
    saHTML +

    '<footer class="cc-footer">SDD v3.5 &middot; Spec Driven Development by metodolog<span class="gold">IA</span></footer>';

  // Search + Filter
  setTimeout(function() {
    var ctrl = SDD.search.init('page-search', {
      placeholder: t('common.search','Search') + '...',
      filters: [{label:'Critical',value:'critical'}, {label:'Major',value:'major'}, {label:'Minor',value:'minor'}],
      onSearch: function(q, f) { filterItems(q, f); },
      onFilter: function(f, q) { filterItems(q, f); }
    });
    function filterItems(query, filter) {
      // Filter bug cards by severity
      var bugCards = document.querySelectorAll('.bug-card');
      var shown = 0, total = bugCards.length;
      bugCards.forEach(function(card) {
        var text = card.textContent.toLowerCase();
        var sevEl = card.querySelector('.bug-sev');
        var sev = sevEl ? sevEl.className : '';
        var matchQuery = !query || text.indexOf(query) !== -1;
        var matchFilter = !filter || filter === 'all' || sev.indexOf(filter) !== -1;
        if (matchQuery && matchFilter) { card.style.display = ''; shown++; }
        else { card.style.display = 'none'; }
      });
      // Also filter checklist rows
      var clRows = document.querySelectorAll('.checklist-row');
      var clShown = 0, clTotal = clRows.length;
      clRows.forEach(function(row) {
        var text = row.textContent.toLowerCase();
        var matchQuery = !query || text.indexOf(query) !== -1;
        if (matchQuery && (!filter || filter === 'all')) { row.style.display = ''; clShown++; }
        else if (matchQuery && filter !== 'all') { row.style.display = ''; clShown++; }
        else { row.style.display = 'none'; }
      });
      ctrl.setCount(shown + clShown, total + clTotal);
    }
  }, 100);

  // Feature filter integration
  window.addEventListener('sdd:filter-applied', function() {
    var active = window.SDD && SDD.filter && SDD.filter.active();
    // Filter checklist rows
    document.querySelectorAll('.checklist-row[data-feature]').forEach(function(row) {
      row.style.display = (!active || SDD.filter.matchesFeature(row.getAttribute('data-feature'))) ? '' : 'none';
    });
    // Filter feature quality heatmap rows
    document.querySelectorAll('.fq-table tbody tr').forEach(function(row) {
      var name = (row.querySelector('td') || {}).textContent || '';
      row.style.display = (!active || SDD.filter.matchesFeature(name)) ? '' : 'none';
    });
  });
})();
</script>

</body>
</html>
