# Configuración de Nginx para Campus MetodologIA v2
# Dominio: metodologia.info
# Subcarpeta: /campus/

server {
    listen 80;
    server_name metodologia.info;

    # Directorio raíz del sitio principal (WordPress u otro)
    root /var/www/metodologia;
    index index.php index.html;

    # ════════════════════════════════════════════════════════════════
    # CONFIGURACIÓN PARA EL CAMPUS (SPA VITE)
    # ════════════════════════════════════════════════════════════════
    location /campus/ {
        # Ruta absoluta donde se subieron los archivos de la carpeta 'dist'
        alias /var/www/metodologia/campus/dist/;
        index index.html;
        
        # Soporte para el Router de la SPA (Hash o History API)
        # Si usas History API, esta línea es vital:
        try_files $uri $uri/ /campus/index.html;

        # Optimización de Assets Estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }
    }

    # Resto de la configuración (PHP, Seguridad, etc.)
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
    }
}
